name: Run Portal → Folder → Environment

on:
  workflow_dispatch:
    inputs:
      portal:
        description: "Select Portal"
        required: true
        type: choice
        options:
          - Admin
          - Merchant
          - Merchant Portal
          - Ally

      folder:
        description: "Enter Folder Name inside Portal"
        required: true
        type: string

      environment:
        description: "Enter Environment Name (QAT / UAT / DEV)"
        required: true
        type: string

      testdata:
        description: "Optional: TestData file name (without .csv)"
        required: false
        type: string

jobs:
  # -------------------------------------------------------
  # DISCOVER COLLECTIONS
  # -------------------------------------------------------

  discover:
    runs-on: ubuntu-latest

    outputs:
      matrix: ${{ steps.matrix.outputs.matrix }}
      portal_actual: ${{ steps.normalize.outputs.portal_actual }}
      folder_path: ${{ steps.normalize.outputs.folder_path }}

    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4

      - name: Install jq
        run: sudo apt-get update && sudo apt-get install -y jq

      - id: normalize
        name: Detect Portal & Folder
        run: |

          INPUT_PORTAL="${{ github.event.inputs.portal }}"
          INPUT_FOLDER="${{ github.event.inputs.folder }}"

          PORTAL_PATH=$(find . -maxdepth 1 -type d -iname "$INPUT_PORTAL" | head -n 1)

          if [ -z "$PORTAL_PATH" ]; then
            echo "❌ Portal not found!"
            exit 1
          fi

          FOLDER_PATH=$(find "$PORTAL_PATH" -type d -iname "$INPUT_FOLDER" | head -n 1)

          if [ -z "$FOLDER_PATH" ]; then
            echo "❌ Folder not found inside portal!"
            exit 1
          fi

          echo "portal_actual=$(basename "$PORTAL_PATH")" >> $GITHUB_OUTPUT
          echo "folder_path=$FOLDER_PATH" >> $GITHUB_OUTPUT

      - id: matrix
        name: Discover Collections
        run: |

          BASE="${{ steps.normalize.outputs.folder_path }}"

          FILES=$(find "$BASE" -type f -name "*.postman_collection.json" \
          | jq -R -s -c 'split("\n")[:-1]')

          if [ "$FILES" = "[]" ]; then
            FILES=$(find "$BASE" -type f -name "*.json" \
            | jq -R -s -c 'split("\n")[:-1]')
          fi

          if [ "$FILES" = "[]" ]; then
            echo "❌ No collections found!"
            exit 1
          fi

          echo "matrix={\"collection\":$FILES}" >> $GITHUB_OUTPUT

  # -------------------------------------------------------
  # RUN TESTS
  # -------------------------------------------------------

  run-tests:
    needs: discover
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.discover.outputs.matrix) }}

    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install Newman
        run: |
          npm install -g newman
          npm install -g newman-reporter-htmlextra

      - name: Resolve Environment & TestData
        run: |

          PORTAL="${{ needs.discover.outputs.portal_actual }}"
          ENV_INPUT="${{ github.event.inputs.environment }}"
          TESTDATA_INPUT="${{ github.event.inputs.testdata }}"

          ENV_DIR="$PORTAL/environment"

          ENV_FILE=$(find "$ENV_DIR" -type f -iname "*$ENV_INPUT*.postman_environment.json" | head -n 1)

          if [ -z "$ENV_FILE" ]; then
            echo "❌ Environment file not found!"
            exit 1
          fi

          echo "ENV_FILE=$PWD/$ENV_FILE" >> $GITHUB_ENV

          if [ -n "$TESTDATA_INPUT" ]; then

            DATA_DIR="$PORTAL/test-data"

            DATA_FILE=$(find "$DATA_DIR" -type f -iname "*$TESTDATA_INPUT*.csv" | head -n 1)

            if [ -z "$DATA_FILE" ]; then
              echo "❌ TestData file not found!"
              exit 1
            fi

            echo "DATA_FILE=$PWD/$DATA_FILE" >> $GITHUB_ENV
          else
            echo "DATA_FILE=" >> $GITHUB_ENV
          fi

      - name: Run Collection
        run: |

          COLLECTION="${{ matrix.collection }}"
          NAME=$(basename "$COLLECTION" .json)

          mkdir -p reports

          set +e

          if [ -n "$DATA_FILE" ]; then

            newman run "$COLLECTION" \
              --environment "$ENV_FILE" \
              --iteration-data "$DATA_FILE" \
              --reporters cli,json,htmlextra \
              --reporter-json-export "reports/$NAME.json" \
              --reporter-htmlextra-export "reports/$NAME.html"

          else

            newman run "$COLLECTION" \
              --environment "$ENV_FILE" \
              --reporters cli,json,htmlextra \
              --reporter-json-export "reports/$NAME.json" \
              --reporter-htmlextra-export "reports/$NAME.html"

          fi

      - name: Upload Reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: api-test-reports
          path: reports/

  # -------------------------------------------------------
  # SLACK NOTIFICATION
  # -------------------------------------------------------

  notify:
    needs: [discover, run-tests]
    runs-on: ubuntu-latest
    if: always()

    steps:
      - name: Download Reports
        uses: actions/download-artifact@v4
        with:
          name: api-test-reports
          path: reports

      - name: Install jq
        run: sudo apt-get update && sudo apt-get install -y jq
      - name: Send Slack Notification
        env:
          SLACK_WEBHOOK: ${{ secrets.SLACK_WEBHOOK }}
        run: |
          TOTAL=0
          FAILED=0

          for file in reports/*.json; do
            T=$(jq '.run.stats.tests.total' "$file")
            F=$(jq '.run.stats.tests.failed' "$file")

            TOTAL=$((TOTAL + T))
            FAILED=$((FAILED + F))
          done

          PASSED=$((TOTAL - FAILED))

          if [ "$FAILED" -eq 0 ]; then
            STATUS=":white_check_mark: PASSED"
          else
            STATUS=":x: FAILED"
          fi

          COLLECTIONS=$(echo '${{ needs.discover.outputs.matrix }}' | jq '.collection | length')

          RUN_URL="https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          REPORT_URL="$RUN_URL#artifacts"

          TEXT="🚀 API Automation Execution Completed\n\nPortal: ${{ github.event.inputs.portal }}\nModule: ${{ github.event.inputs.folder }}\nEnvironment: ${{ github.event.inputs.environment }}\nExecuted By: ${{ github.actor }}\n\n📊 Execution Summary\n• Collections: $COLLECTIONS\n• Total Tests: $TOTAL\n• Passed: $PASSED\n• Failed: $FAILED\n\nOverall Status: $STATUS\n\n🔗 GitHub Run:\n$RUN_URL\n\n📄 HTML Report:\n$REPORT_URL"

          jq -n --arg text "$TEXT" '{text: $text}' \
          | curl -X POST -H "Content-type: application/json" \
            --data @- $SLACK_WEBHOOK
