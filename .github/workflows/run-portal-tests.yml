name: Run Portal → Folder → Environment

on:
  workflow_dispatch:
    inputs:
      portal:
        description: "Select Portal"
        required: true
        type: choice
        options:
          - Admin
          - Merchant
          - Merchant Portal
          - Ally

      folder:
        description: "Enter Folder Name inside Portal"
        required: true
        type: string

      environment:
        description: "Enter Environment Name (e.g., QAT, UAT, DEV)"
        required: true
        type: string

      testdata:
        description: "Optional: Enter TestData file name (without .csv)"
        required: false
        type: string

jobs:
  discover:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
      portal_actual: ${{ steps.normalize.outputs.portal_actual }}
      folder_path: ${{ steps.normalize.outputs.folder_path }}

    steps:
      - uses: actions/checkout@v4

      - name: Install jq
        run: sudo apt-get update && sudo apt-get install -y jq

      - id: normalize
        run: |
          INPUT_PORTAL="${{ github.event.inputs.portal }}"
          INPUT_FOLDER="${{ github.event.inputs.folder }}"

          # Search for portal folder at repo root
          PORTAL_PATH=$(find . -maxdepth 1 -type d -iname "$INPUT_PORTAL" | head -n 1)
          if [ -z "$PORTAL_PATH" ]; then
            echo "❌ Portal not found!"
            exit 1
          fi

          # Search for folder inside portal
          FOLDER_PATH=$(find "$PORTAL_PATH" -type d -iname "$INPUT_FOLDER" | head -n 1)
          if [ -z "$FOLDER_PATH" ]; then
            echo "❌ Folder not found inside portal!"
            exit 1
          fi

          echo "portal_actual=$(basename "$PORTAL_PATH")" >> $GITHUB_OUTPUT
          echo "folder_path=$FOLDER_PATH" >> $GITHUB_OUTPUT

      - id: set-matrix
        run: |
          BASE="${{ steps.normalize.outputs.folder_path }}"

          FILES=$(find "$BASE" -type f -name "*.postman_collection.json" | jq -R -s -c 'split("\n")[:-1]')
          if [ "$FILES" = "[]" ]; then
            FILES=$(find "$BASE" -type f -name "*.json" | jq -R -s -c 'split("\n")[:-1]')
          fi
          if [ "$FILES" = "[]" ]; then
            echo "❌ No collections found!"
            exit 1
          fi

          echo "matrix={\"collection\":$FILES}" >> $GITHUB_OUTPUT

  run-tests:
    needs: discover
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.discover.outputs.matrix) }}

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install Newman
        run: npm install -g newman newman-reporter-htmlextra

      - name: Resolve Environment & Test Data
        run: |
          PORTAL="${{ needs.discover.outputs.portal_actual }}"
          ENV_INPUT="${{ github.event.inputs.environment }}"
          TESTDATA_INPUT="${{ github.event.inputs.testdata }}"

          ENV_DIR="$PORTAL/environment"
          ENV_FILE=$(find "$ENV_DIR" -type f -iname "*$ENV_INPUT*.postman_environment.json" | head -n 1)
          if [ -z "$ENV_FILE" ]; then
            echo "❌ Environment file not found!"
            exit 1
          fi
          echo "ENV_FILE=$PWD/$ENV_FILE" >> $GITHUB_ENV

          if [ -n "$TESTDATA_INPUT" ]; then
            DATA_DIR="$PORTAL/test-data"
            DATA_FILE=$(find "$DATA_DIR" -type f -iname "*$TESTDATA_INPUT*.csv" | head -n 1)
            if [ -z "$DATA_FILE" ]; then
              echo "❌ TestData file not found!"
              exit 1
            fi
            echo "DATA_FILE=$PWD/$DATA_FILE" >> $GITHUB_ENV
          else
            echo "DATA_FILE=" >> $GITHUB_ENV
          fi

      - name: Run Collection
        run: |
          COLLECTION="${{ matrix.collection }}"
          NAME=$(basename "$COLLECTION" .json)
          set +e

          if [ -n "$DATA_FILE" ]; then
            newman run "$COLLECTION" \
              --environment "$ENV_FILE" \
              --iteration-data "$DATA_FILE" \
              --reporters cli,json \
              --reporter-json-export "$NAME-report.json"
          else
            newman run "$COLLECTION" \
              --environment "$ENV_FILE" \
              --reporters cli,json \
              --reporter-json-export "$NAME-report.json"
          fi

      - name: Upload JSON Reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: json-reports
          path: "*-report.json"

  notify:
    needs: [discover, run-tests]
    runs-on: ubuntu-latest
    if: always()

    steps:
      - uses: actions/download-artifact@v4
        with:
          name: json-reports
          path: reports

      - name: Install jq
        run: sudo apt-get update && sudo apt-get install -y jq

      - name: Calculate Test Summary & Notify Slack
        env:
          SLACK_WEBHOOK: ${{ secrets.SLACK_WEBHOOK }}
        run: |
          TOTAL=0
          FAILED=0

          for file in reports/*.json; do
            T=$(jq '.run.stats.tests.total' "$file")
            F=$(jq '.run.stats.tests.failed' "$file")
            TOTAL=$((TOTAL + T))
            FAILED=$((FAILED + F))
          done

          PASSED=$((TOTAL - FAILED))
          FINAL="✅ PASSED"
          if [ "$FAILED" -gt 0 ]; then
            FINAL="❌ FAILED"
          fi

          COLLECTIONS=$(echo '${{ needs.discover.outputs.matrix }}' | jq '.collection | length')

          MESSAGE="🚀 API Automation Execution Completed\n\nPortal: ${{ github.event.inputs.portal }}\nModule: ${{ github.event.inputs.folder }}\nEnvironment: ${{ github.event.inputs.environment }}\n\nExecution Summary\n• Collections Executed: $COLLECTIONS\n• Total Tests: $TOTAL\n• Passed: $PASSED ✅\n• Failed: $FAILED ❌\n\nOverall Status: $FINAL"

          curl -X POST -H "Content-type: application/json" \
            --data "{\"text\":\"$MESSAGE\"}" \
            $SLACK_WEBHOOK
