name: Run Portal → Folder → Environment

on:
  workflow_dispatch:
    inputs:
      portal:
        description: Select Portal
        required: true
        type: choice
        options:
          - Admin
          - Merchant
          - Merchant Portal
          - Ally

      folder:
        description: Enter Folder Name inside Portal
        required: true
        type: string

      environment:
        description: Enter Environment Name (QAT/UAT/DEV)
        required: true
        type: string

      testdata:
        description: Optional TestData file (without .csv)
        required: false
        type: string

jobs:
  discover:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.matrix.outputs.matrix }}
      portal_actual: ${{ steps.normalize.outputs.portal_actual }}
      folder_path: ${{ steps.normalize.outputs.folder_path }}

    steps:
      - uses: actions/checkout@v4

      - name: Install jq
        run: sudo apt-get update -y && sudo apt-get install -y jq

      - id: normalize
        run: |
          set -e

          PORTAL_INPUT="${{ github.event.inputs.portal }}"
          FOLDER_INPUT="${{ github.event.inputs.folder }}"

          PORTAL_PATH=$(find . -maxdepth 1 -type d -iname "$PORTAL_INPUT" | head -n 1)
          [ -z "$PORTAL_PATH" ] && echo "Portal not found" && exit 1

          FOLDER_PATH=$(find "$PORTAL_PATH" -type d -iname "$FOLDER_INPUT" | head -n 1)
          [ -z "$FOLDER_PATH" ] && echo "Folder not found" && exit 1

          echo "portal_actual=$(basename "$PORTAL_PATH")" >> $GITHUB_OUTPUT
          echo "folder_path=$FOLDER_PATH" >> $GITHUB_OUTPUT

      - id: matrix
        run: |
          set -e
          BASE="${{ steps.normalize.outputs.folder_path }}"

          FILES=$(find "$BASE" -type f -name "*.postman_collection.json" -print0 \
            | xargs -0 -I{} echo "{}" \
            | jq -R -s -c 'split("\n")[:-1]')

          [ "$FILES" = "[]" ] && echo "No collections found" && exit 1

          echo "matrix={\"collection\":$FILES}" >> $GITHUB_OUTPUT

  run-tests:
    needs: discover
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.discover.outputs.matrix) }}

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install Newman
        run: npm install -g newman

      - name: Resolve Environment & Test Data
        run: |
          set -e

          PORTAL="${{ needs.discover.outputs.portal_actual }}"
          ENV_INPUT="${{ github.event.inputs.environment }}"
          TESTDATA_INPUT="${{ github.event.inputs.testdata }}"

          ENV_FILE=$(find "$PORTAL/environment" -type f -iname "*$ENV_INPUT*.postman_environment.json" | head -n 1)
          [ -z "$ENV_FILE" ] && echo "Environment file not found" && exit 1
          echo "ENV_FILE=$PWD/$ENV_FILE" >> $GITHUB_ENV

          if [ -n "$TESTDATA_INPUT" ]; then
            DATA_FILE=$(find "$PORTAL/test-data" -type f -iname "*$TESTDATA_INPUT*.csv" | head -n 1)
            [ -z "$DATA_FILE" ] && echo "TestData file not found" && exit 1
            echo "DATA_FILE=$PWD/$DATA_FILE" >> $GITHUB_ENV
          fi

      - name: Run Collection
        run: |
          COLLECTION="${{ matrix.collection }}"
          NAME=$(basename "$COLLECTION" .json)

          if [ -n "$DATA_FILE" ]; then
            newman run "$COLLECTION" \
              --environment "$ENV_FILE" \
              --iteration-data "$DATA_FILE" \
              --reporters cli,json \
              --reporter-json-export "$NAME-report.json" || true
          else
            newman run "$COLLECTION" \
              --environment "$ENV_FILE" \
              --reporters cli,json \
              --reporter-json-export "$NAME-report.json" || true
          fi

      - name: Upload JSON Reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: json-reports
          path: "*-report.json"

  notify:
    needs: [discover, run-tests]
    runs-on: ubuntu-latest
    if: always()

    steps:
      - uses: actions/download-artifact@v4
        with:
          name: json-reports
          path: reports

      - name: Install jq
        run: sudo apt-get update -y && sudo apt-get install -y jq

      - name: Calculate & Notify Slack
        env:
          SLACK_WEBHOOK: ${{ secrets.SLACK_WEBHOOK }}
        run: |
          TOTAL=0
          FAILED=0

          for file in reports/*.json; do
            T=$(jq '.run.stats.tests.total' "$file")
            F=$(jq '.run.stats.tests.failed' "$file")
            TOTAL=$((TOTAL + T))
            FAILED=$((FAILED + F))
          done

          PASSED=$((TOTAL - FAILED))

          if [ "$FAILED" -eq 0 ]; then
            STATUS="PASSED"
            ICON="✅"
          else
            STATUS="FAILED"
            ICON="❌"
          fi

          COLLECTIONS=$(echo '${{ needs.discover.outputs.matrix }}' | jq '.collection | length')

          MESSAGE="API Automation Execution Completed\n\nPortal: ${{ github.event.inputs.portal }}\nModule: ${{ github.event.inputs.folder }}\nEnvironment: ${{ github.event.inputs.environment }}\n\nExecution Summary\n• Collections: $COLLECTIONS\n• Total Tests: $TOTAL\n• Passed: $PASSED\n• Failed: $FAILED\n\nOverall Status: $ICON $STATUS"

          jq -n --arg text "$MESSAGE" '{text: $text}' \
          | curl -s -X POST -H "Content-type: application/json" \
            --data @- "$SLACK_WEBHOOK"
